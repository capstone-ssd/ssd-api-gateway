spring.application.name=ssd-api-gateway
server.port=8080
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=http://ssd-auth-service:8080
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=1
spring.cloud.gateway.mvc.routes[1].id=member-service
spring.cloud.gateway.mvc.routes[1].uri=http://ssd-member-service:8080
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/members/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=1
spring.cloud.gateway.mvc.routes[2].id=document-service
spring.cloud.gateway.mvc.routes[2].uri=http://ssd-document-service:8080
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/documents/**
spring.cloud.gateway.mvc.routes[2].filters[0]=StripPrefix=1
spring.cloud.gateway.mvc.routes[3].id=review-service
spring.cloud.gateway.mvc.routes[3].uri=http://ssd-review-service:8080
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/reviews/**
spring.cloud.gateway.mvc.routes[3].filters[0]=StripPrefix=1
spring.cloud.gateway.mvc.routes[4].id=ai-orchestrator
spring.cloud.gateway.mvc.routes[4].uri=http://ssd-ai-orchestrator:8080
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/ai/**
spring.cloud.gateway.mvc.routes[4].filters[0]=StripPrefix=1
